name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm --prefix web ci
      - run: npx --prefix web playwright install --with-deps chromium
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.4.0
      - name: Run full Go lint suite
        run: golangci-lint run
      - run: make check
      - run: make web-e2e
      - name: Verify Go browser core builds for WebAssembly
        run: GOOS=js GOARCH=wasm go build ./internal/model ./internal/analyzers ./internal/alignment ./internal/browsercore
      - run: make webapp-e2e
      - run: go test -race ./...
      - run: git diff --exit-code -- web/dist
      - run: make build
      - name: Verify release targets compile
        shell: bash
        run: |
          set -euo pipefail
          for target in darwin/amd64 darwin/arm64 linux/amd64 linux/arm64; do
            GOOS=${target%/*} GOARCH=${target#*/} CGO_ENABLED=0 \
              go build -o /tmp/rlviz-${target%/*}-${target#*/} ./cmd/rlviz
          done
