name: deploy public site

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  fork-notice:
    if: github.event.repository.fork
    runs-on: ubuntu-latest
    steps:
      - name: Skip deployment from a fork
        run: echo "::notice::Skipping Vercel deployment because this repository is a fork."

  deploy:
    if: ${{ !github.event.repository.fork }}
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID_DOCS: ${{ vars.VERCEL_PROJECT_ID_DOCS }}
      VERCEL_PROJECT_ID_APP: ${{ vars.VERCEL_PROJECT_ID_APP }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Validate deployment configuration
        shell: bash
        run: |
          set -euo pipefail
          : "${VERCEL_TOKEN:?missing required secret VERCEL_TOKEN}"
          : "${VERCEL_ORG_ID:?missing required variable VERCEL_ORG_ID}"
          : "${VERCEL_PROJECT_ID_DOCS:?missing required variable VERCEL_PROJECT_ID_DOCS}"
          : "${VERCEL_PROJECT_ID_APP:?missing required variable VERCEL_PROJECT_ID_APP}"
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            web/package-lock.json
            webapp/package-lock.json
      - name: Build the public site
        run: make site
      - name: Install Vercel CLI
        run: npm install --global vercel@56.4.1
      - name: Deploy the viewer and documentation
        env:
          VERCEL_PROJECT_ID: ${{ env.VERCEL_PROJECT_ID_DOCS }}
        run: vercel deploy site/dist --prod --yes --scope "$VERCEL_ORG_ID"
      - name: Redirect the former app domain
        env:
          VERCEL_PROJECT_ID: ${{ env.VERCEL_PROJECT_ID_APP }}
        run: vercel deploy app-redirect --prod --yes --scope "$VERCEL_ORG_ID"
